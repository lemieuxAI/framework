    active_rotation: ["Jakub Dobes", "Jacob Fowler"]
    demoted: ["Sam Montembeault"]
    rationale: |
      Montembeault has been surclassé par Dobeš et Fowler over the back half
      of 25-26. Dobeš won the R1 series vs Tampa with a 28/29 .966 in Game 7
      and is the unambiguous starter. Fowler is the playoff backup. Montembeault
      is rostered + healthy but not in the playoff rotation; he has no realistic
      chance of starting a playoff game.
