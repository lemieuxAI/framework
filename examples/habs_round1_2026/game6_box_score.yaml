# Notable narrative anchors (manual)
narrative_anchors:
  vasilevskiy_bounceback:
    significance: |
      30 saves on 30 shots — Vasilevskiy's 8th career Stanley Cup Playoff
      shutout. Notable because his .875 in G5 had been the obvious cause of
      the MTL win that game; the G5 brief explicitly flagged "expect him at
      .920+ in G6." He delivered 1.000.
  goncalves_two_in_two:
    significance: |
      Goncalves scored TBL's only goal in G5 (2nd-period equalizer) and
      now the OT winner in G6. Two of his 3 series goals are in elimination
      games. He plays 13-15 min/game in a 4th-line role; this is the kind of
      depth-scoring inversion that decides 1-goal series.
  l1_5v5_drought:
    significance: |
      Suzuki–Caufield–Slafkovský combined for 0 points on 6 SOG at 5v5 in
      G6. Through 6 games, the L1 has 0 5v5 goals — Slafkovský's 3 series
      goals are all PP, Caufield's series total is split between 5v5
      assists and PP, and Suzuki has been pure playmaker (mostly PP).
      The trio outshot TBL's L1 (Hagel-Point-Kucherov) but the Suzuki
      line still hasn't beaten Vasilevskiy at even strength.
  series_competitiveness:
    significance: |
      All 6 games decided by 1 goal. 4 of 6 went to overtime (G2, G3, G4, G6).
      Combined goal differential: 12-13 in MTL's favor. This is the most
      evenly contested series of Round 1 by any margin metric — both teams
      effectively split equally.
  demidov_5_shots:
    significance: |
      5 SOG in 17:38 — Demidov's most active offensive game of the series
      by SOG count. 0 points and a goalie-interference penalty late, but
      the shot volume + ixG buildup says he's beating defenders to the
      slot with increasing regularity. The rookie nerves on finishing
      remain (still 0 G at 5v5 in series).
