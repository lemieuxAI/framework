# Narrative anchors (manual)
narrative_anchors:
  dobes_heist:
    significance: |
      9 shots vs 29. .966 save percentage. The L1 drought ending was
      clutch storytelling, but the actual reason MTL advances is a 24-year-old
      rookie in his first playoff series. Dobes was the canonical
      "stand-on-your-head" performance of the 2026 playoffs.
  l1_drought_ends:
    significance: |
      Six games of 0 5v5 goals for Suzuki-Caufield-Slafkovsky. The first
      goal of Game 7, late P1, came from Suzuki off a Guhle-Anderson rush.
      Vindication of the iso-says-they're-creating-just-not-finishing read.
  newhook_winner:
    significance: |
      Hutson set up an entry, Newhook batted at a backhand from below the
      goal line, the puck found a way past Vasilevskiy. Low-quality goal
      that decides the series. Newhook is the L4 center promoted to that
      role in G5; this is his second 5v5 series-winning shift.
  zero_shots_p2:
    significance: |
      MTL's second period: zero shots on goal. Tampa took over the period
      after the James PP goal. The Habs' game plan from then on was visibly
      shell up and trust Dobes. It worked.
  outshot_9_29:
    significance: |
      The ratio of 9 shots for vs 29 against is one of the most extreme
      outshot Game 7 wins in modern playoff history. Most "stolen" Game 7s
      run more like 18-30 — this was a complete defensive shell + a goalie
      stealing it.
  series_competitiveness:
    significance: |
      Final series: all 7 games decided by 1 goal. 4 of 7 in OT. Combined
      goal differential: 14-13 MTL. The most tightly contested R1 series
      across the entire 2026 bracket — and decided by the rookie goalie at
      the end.
